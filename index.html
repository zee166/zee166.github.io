<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login with Google</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      background-color: #121212;
      color: #ffffff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background-color: #1e1e1e;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-container h1 {
      margin-bottom: 30px;
      font-size: 24px;
      color: #ffffff;
    }
    .g_id_signin {
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background-color: #ff4d4d;
      color: white;
      border-radius: 5px;
      margin-top: 20px;
      transition: background 0.3s;
    }
    button:hover {
      background-color: #e60000;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>เข้าสู่ระบบด้วย Google</h1>

    <!-- Google Sign-In Button -->
    <div id="g_id_onload"
         data-client_id="102756817810-k9nr640vehnr3il0rt2sfl98v1ej773s.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse">
    </div>

    <div class="g_id_signin" data-type="standard"></div>
  </div>

  <script>
    // ฟังก์ชันตรวจสอบสถานะการล็อกอินของ Google
    window.onload = function() {
      google.accounts.id.initialize({
        client_id: "102756817810-k9nr640vehnr3il0rt2sfl98v1ej773s.apps.googleusercontent.com",
        callback: handleCredentialResponse
      });

      // ตรวจสอบสถานะการล็อกอิน
      google.accounts.id.prompt(); // หากมีการล็อกอินอยู่แล้ว มันจะให้ข้อมูล
    }

    // ฟังก์ชันที่ใช้ในการจัดการข้อมูลเมื่อผู้ใช้ล็อกอินสำเร็จ
    function handleCredentialResponse(response) {
      const data = parseJwt(response.credential);
      console.log("User Data:", data);

      // เก็บข้อมูลผู้ใช้ใน localStorage
      localStorage.setItem('userData', JSON.stringify(data));

      // ไปที่หน้า Home เมื่อล็อกอินสำเร็จ
      window.location.href = "home.html";
    }

    // ฟังก์ชันแปลง JWT Token เป็น JSON
    function parseJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
      ).join(''));
      return JSON.parse(jsonPayload);
    }
  </script>
</body>
</html>
