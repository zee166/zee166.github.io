<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login with Google</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 50px;
    }
    #user-info {
      display: none;
      margin-top: 20px;
    }
    #logout {
      display: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background-color: red;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>เข้าสู่ระบบด้วย Google</h1>

  <!-- Google Sign-In Button -->
  <div id="g_id_onload"
       data-client_id="102756817810-k9nr640vehnr3il0rt2sfl98v1ej773s.apps.googleusercontent.com"
       data-context="signin"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>

  <div class="g_id_signin" data-type="standard"></div>

  <button id="logout">Logout</button>

  <div id="user-info">
    <h2>Welcome, <span id="user-name"></span>!</h2>
    <img id="user-pic" src="" alt="Profile Picture" width="100">
  </div>

  <script>
    function handleCredentialResponse(response) {
      // Decode JWT token เพื่อดึงข้อมูลผู้ใช้
      const data = parseJwt(response.credential);
      console.log("User Data:", data);

      // แสดงข้อมูลผู้ใช้
      document.getElementById("user-name").textContent = data.name;
      document.getElementById("user-pic").src = data.picture;
      document.getElementById("user-info").style.display = "block";

      // ซ่อนปุ่ม Login และแสดงปุ่ม Logout
      document.querySelector(".g_id_signin").style.display = "none";
      document.getElementById("logout").style.display = "inline-block";
    }

    // ฟังก์ชันแปลง JWT Token เป็น JSON
    function parseJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
      ).join(''));
      return JSON.parse(jsonPayload);
    }

    // ปุ่ม Logout
    document.getElementById("logout").addEventListener("click", () => {
      document.getElementById("user-info").style.display = "none";
      document.querySelector(".g_id_signin").style.display = "block";
      document.getElementById("logout").style.display = "none";
    });
  </script>
</body>
</html>
