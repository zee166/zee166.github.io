<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบด้วย Google</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #121212;
      color: #ffffff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background-color: #1e1e1e;
      padding: 40px 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    .login-container h1 {
      margin-bottom: 30px;
      font-size: 24px;
      color: #ffffff;
    }

    .custom-google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #4285F4;
      color: #ffffff;
      font-size: 18px;
      padding: 10px 20px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      width: 100%;
      max-width: 300px;
      transition: background-color 0.3s ease;
    }

    .custom-google-btn:hover {
      background-color: #3367D6;
    }

    .custom-google-btn img {
      margin-right: 10px;
      width: 24px;
      height: 24px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>เข้าสู่ระบบด้วย Google</h1>
    <!-- ปุ่ม Custom -->
    <button class="custom-google-btn" id="googleSignInBtn">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo">
      ลงชื่อเข้าใช้ด้วย Google
    </button>
  </div>

  <script>
    // เริ่มต้น Google API
    google.accounts.id.initialize({
      client_id: "102756817810-k9nr640vehnr3il0rt2sfl98v1ej773s.apps.googleusercontent.com",
      callback: handleCredentialResponse, // ฟังก์ชันที่เรียกเมื่อเข้าสู่ระบบสำเร็จ
    });

    // ฟังก์ชันจัดการปุ่มเข้าสู่ระบบ
    document.getElementById('googleSignInBtn').addEventListener('click', function() {
      google.accounts.id.prompt(); // เปิด Popup การเข้าสู่ระบบ
    });

    // ฟังก์ชัน Callback สำหรับจัดการข้อมูลหลังเข้าสู่ระบบ
    function handleCredentialResponse(response) {
      const data = parseJwt(response.credential);
      console.log("User Data:", data);

      // เก็บข้อมูลผู้ใช้ใน localStorage
      localStorage.setItem('userData', JSON.stringify(data));

      // ไปที่หน้า Home เมื่อล็อกอินสำเร็จ
      window.location.href = "home.html";
    }

    // ฟังก์ชันแปลง JWT Token เป็น JSON
    function parseJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(
        atob(base64)
          .split('')
          .map((c) => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
          .join('')
      );
      return JSON.parse(jsonPayload);
    }
  </script>
</body>
</html>
