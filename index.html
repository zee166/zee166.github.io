<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบด้วย Google</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.25/jsrsasign-all-min.js"></script>
  <style>
    /* CSS เดิม */
  </style>
</head>
<body>
  <div class="login-container">
    <h1>เข้าสู่ระบบด้วย Google</h1>
    <div id="googleSignInBtn"></div>
  </div>

  <script>
    google.accounts.id.initialize({
      client_id: "102756817810-k9nr640vehnr3il0rt2sfl98v1ej773s.apps.googleusercontent.com",
      callback: handleCredentialResponse,
      login_uri: "https://zee166.github.io", // ใส่ URL จริง
      ux_mode: "popup"
    });

    function handleCredentialResponse(response) {
      try {
        if (response.error) {
          throw new Error(response.error);
        }
        
        const data = JSON.parse(decodeURIComponent(escape(
          atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))
        )));

        console.log("User Data:", data);
        localStorage.setItem('userData', JSON.stringify(data));
        window.location.href = "home.html";
      } catch (error) {
        console.error("Login Error:", error);
        alert("เกิดข้อผิดพลาดในการเข้าสู่ระบบ: " + error.message);
      }
    }

    // Render ปุ่ม Google อย่างถูกต้อง
    google.accounts.id.renderButton(
      document.getElementById("googleSignInBtn"),
      {
        type: "icon",
        theme: "filled_blue",
        size: "large",
        text: "signin_with",
        shape: "circle"
      }
    );
  </script>
</body>
</html>
