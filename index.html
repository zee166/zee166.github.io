<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบด้วย Google</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      background-color: #121212;
      color: #ffffff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background-color: #1e1e1e;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-container h1 {
      margin-bottom: 30px;
      font-size: 24px;
      color: #ffffff;
    }

    /* ปรับขนาดปุ่ม Google Sign-In */
    .g_id_signin {
      display: inline-block;
      width: 100%;
      max-width: 350px; /* เพิ่มความกว้างสูงสุด */
      height: 50px; /* ปรับความสูง */
    }

    /* เพิ่มเงาให้ปุ่ม */
    .g_id_signin button {
      box-shadow: 0 4px 8px rgba(255, 255, 255, 0.2);
      border-radius: 10px; /* มุมมน */
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>เข้าสู่ระบบด้วย Google</h1>

    <!-- ปุ่ม Google Sign-In -->
    <div id="g_id_onload"
         data-client_id="102756817810-k9nr640vehnr3il0rt2sfl98v1ej773s.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse">
    </div>

    <div class="g_id_signin" data-type="standard" data-size="large"></div>
  </div>

  <script>
    function handleCredentialResponse(response) {
      const data = parseJwt(response.credential);
      console.log("User Data:", data);

      // เก็บข้อมูลผู้ใช้ใน localStorage
      localStorage.setItem('userData', JSON.stringify(data));

      // ไปที่หน้า Home เมื่อล็อกอินสำเร็จ
      window.location.href = "home.html";
    }

    // ฟังก์ชันแปลง JWT Token เป็น JSON
    function parseJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
      ).join(''));
      return JSON.parse(jsonPayload);
    }
  </script>
</body>
</html>
