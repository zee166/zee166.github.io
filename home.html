<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หน้าแรก</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
      text-align: center;
      padding: 50px;
    }
    #user-info {
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background-color: #ff4d4d;
      color: white;
      border-radius: 5px;
      margin-top: 20px;
      transition: background 0.3s;
    }
    button:hover {
      background-color: #e60000;
    }
  </style>
</head>
<body>
  <h1>ยินดีต้อนรับ, <span id="user-name"></span>!</h1>
  <div id="user-info">
    <img id="user-pic" src="" alt="ภาพโปรไฟล์" width="100">
  </div>

  <button id="logout">ออกจากระบบ</button>

  <script>
    // ตรวจสอบสถานะการล็อกอิน
    window.onload = function() {
      if (!localStorage.getItem('userData')) {
        window.location.href = "index.html"; // ถ้ายังไม่ล็อกอิน ให้ไปหน้า login
      } else {
        const userData = JSON.parse(localStorage.getItem('userData'));
        document.getElementById("user-name").textContent = userData.name;
        document.getElementById("user-pic").src = userData.picture;
      }
    }

    // ปุ่ม Logout
    document.getElementById("logout").addEventListener("click", function() {
      // ลบข้อมูลผู้ใช้ใน localStorage และไปที่หน้า login
      localStorage.removeItem('userData');
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
